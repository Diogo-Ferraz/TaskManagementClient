<div class="layout-topbar">
    <div class="layout-topbar-logo-container">
        <button class="layout-menu-button layout-topbar-action" (click)="layoutService.onMenuToggle()">
            <i class="pi pi-bars"></i>
        </button>
        <a class="layout-topbar-logo" [routerLink]="homeRoute">
            <span class="topbar-logo-mark" aria-hidden="true">TM</span>
            <span class="layout-topbar-logo-text">Task Management</span>
            <span *ngIf="isPreviewMode" class="topbar-preview-badge">
                <i class="pi pi-eye"></i>
                Preview Mode
            </span>
        </a>
    </div>

    <div class="layout-topbar-actions">
        <div class="layout-config-menu">
            <button type="button" class="layout-topbar-action" (click)="toggleDarkMode()">
                <i [ngClass]="{ 'pi ': true, 'pi-sun': layoutService.isDarkTheme(), 'pi-moon': !layoutService.isDarkTheme() }"></i>
            </button>
        </div>

        <div class="layout-topbar-menu">
            <div class="layout-topbar-menu-content">
                <button type="button" class="layout-topbar-action" routerLink="/calendar">
                    <i class="pi pi-calendar"></i>
                    <span>Due Dates</span>
                </button>
                <button
                    *ngIf="showNotificationIndicator"
                    type="button"
                    class="layout-topbar-action layout-topbar-action--notifications"
                    (click)="notificationsPanel.toggle($event)">
                    <i class="pi pi-bell" pBadge [value]="unreadNotifications" [badgeDisabled]="unreadNotifications === 0" severity="danger"></i>
                    <span>Notifications</span>
                </button>
                <button
                    *ngIf="authService.isAuthenticated(); else signInButton"
                    type="button"
                    class="layout-topbar-account"
                    (click)="accountMenu.toggle($event)">
                    <p-avatar [label]="currentUserInitials" size="normal" shape="circle"></p-avatar>
                    <span class="layout-topbar-account__text">
                        <strong>{{ currentUserDisplayName }}</strong>
                        <small>{{ currentUserEmail }}</small>
                    </span>
                    <i class="pi pi-angle-down"></i>
                </button>
                <ng-template #signInButton>
                    <button type="button" class="layout-topbar-action" (click)="signIn()">
                        <i class="pi pi-sign-in"></i>
                        <span>Sign in</span>
                    </button>
                </ng-template>
            </div>
        </div>
        <p-menu #accountMenu [popup]="true" [model]="accountMenuItems" [appendTo]="'body'" styleClass="topbar-account-menu">
            <ng-template pTemplate="start">
                <div class="topbar-account-menu__header">
                    <div class="topbar-account-menu__identity">
                        <p-avatar [label]="currentUserInitials" shape="circle"></p-avatar>
                        <div>
                            <strong>{{ currentUserDisplayName }}</strong>
                            <small>{{ currentUserEmail }}</small>
                            <small class="topbar-account-menu__role-line">{{ currentRoleLabel }}</small>
                        </div>
                    </div>
                </div>
            </ng-template>
        </p-menu>
        <p-overlayPanel #notificationsPanel styleClass="topbar-notifications-panel" [showCloseIcon]="true" [appendTo]="'body'" (onShow)="markNotificationsAsRead()">
            <div class="topbar-notifications">
                <div class="topbar-notifications__header">
                    <strong>Notifications</strong>
                    <small>{{ unreadNotifications }} unread</small>
                </div>

                <div *ngIf="notificationItems.length > 0; else emptyNotifications" class="topbar-notifications__list">
                    <button
                        type="button"
                        class="topbar-notification-item"
                        *ngFor="let item of notificationItems"
                        [class.topbar-notification-item--unread]="item.unread"
                        (click)="openNotification(item, notificationsPanel)">
                        <span class="topbar-notification-item__title">{{ item.title }}</span>
                        <span class="topbar-notification-item__message">{{ item.message }}</span>
                        <span class="topbar-notification-item__time">{{ notificationTime(item.occurredAt) }}</span>
                    </button>
                </div>

                <ng-template #emptyNotifications>
                    <div class="topbar-notifications__empty">No notifications yet.</div>
                </ng-template>
            </div>
        </p-overlayPanel>
    </div>
</div>
