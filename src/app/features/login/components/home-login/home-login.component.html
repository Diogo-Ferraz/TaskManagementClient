<div class="flex align-items-center justify-content-center min-h-screen">
  <div class="col-12 md:col-6 lg:col-4">
    <p-card header="Sign In" class="p-shadow-4">
      <div class="p-fluid">
        <p>Use your existing OpenIddict account to continue.</p>
        <p-button
          label="Sign in with OpenIddict"
          class="mt-3"
          icon="pi pi-sign-in"
          type="button"
          (onClick)="signIn()"
        ></p-button>
      </div>
    </p-card>
  </div>
</div>
